services:
  metadata-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-surveillance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-surveillance}
      POSTGRES_DB: ${POSTGRES_DB:-surveillance}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-surveillance}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  frame-queue:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  migrate:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    command: sh -c "cd /app/services/common && uv run --project /app/services/api alembic upgrade head"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-surveillance}:${POSTGRES_PASSWORD:-surveillance}@metadata-db:5432/${POSTGRES_DB:-surveillance}
    depends_on:
      metadata-db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-surveillance}:${POSTGRES_PASSWORD:-surveillance}@metadata-db:5432/${POSTGRES_DB:-surveillance}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-change-me-to-a-random-32-byte-value}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      metadata-db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-surveillance}:${POSTGRES_PASSWORD:-surveillance}@metadata-db:5432/${POSTGRES_DB:-surveillance}
      REDIS_URL: redis://frame-queue:6379/0
    depends_on:
      frame-queue:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  detection:
    build:
      context: .
      dockerfile: services/detection/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-surveillance}:${POSTGRES_PASSWORD:-surveillance}@metadata-db:5432/${POSTGRES_DB:-surveillance}
      REDIS_URL: redis://frame-queue:6379/0
      FRAME_STORE_DIR: /data/frames
    volumes:
      - frame-store:/data/frames
    depends_on:
      frame-queue:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  reid:
    build:
      context: .
      dockerfile: services/reid/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-surveillance}:${POSTGRES_PASSWORD:-surveillance}@metadata-db:5432/${POSTGRES_DB:-surveillance}
      REDIS_URL: redis://frame-queue:6379/0
    volumes:
      - frame-store:/data/frames:ro
    depends_on:
      frame-queue:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  retention:
    build:
      context: .
      dockerfile: services/retention/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-surveillance}:${POSTGRES_PASSWORD:-surveillance}@metadata-db:5432/${POSTGRES_DB:-surveillance}
      RETENTION_DAYS: ${RETENTION_DAYS:-90}
      RETENTION_GC_INTERVAL_SECONDS: ${RETENTION_GC_INTERVAL_SECONDS:-86400}
    volumes:
      - frame-store:/data/frames
    depends_on:
      metadata-db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pg-data:
  frame-store:
